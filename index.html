<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKER SAVING SYSTEM - TARGET 1.8M</title>
    <style>
        :root {
            --hacker-green: #00ff41;
            --dark-bg: #0d0d0d;
            --matrix-glow: 0 0 10px #00ff41;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--hacker-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--hacker-green);
            padding: 20px;
            box-shadow: var(--matrix-glow);
            background: rgba(0, 0, 0, 0.9);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--hacker-green);
            padding-bottom: 10px;
        }

        .stats {
            margin: 20px 0;
            font-size: 1.1rem;
        }

        .progress-container {
            width: 100%;
            height: 30px;
            background: #001a00;
            border: 1px solid var(--hacker-green);
            position: relative;
            margin-bottom: 10px;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--hacker-green);
            box-shadow: var(--matrix-glow);
            transition: width 0.5s ease-in-out;
        }

        #percent-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 5px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        input {
            background: transparent;
            border: 1px solid var(--hacker-green);
            color: var(--hacker-green);
            padding: 10px;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        button {
            background: var(--hacker-green);
            color: black;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: white;
            box-shadow: var(--matrix-glow);
        }

        #log {
            margin-top: 20px;
            height: 100px;
            overflow-y: auto;
            border-top: 1px solid var(--hacker-green);
            font-size: 0.8rem;
            padding-top: 10px;
        }

        .log-entry {
            margin-bottom: 5px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: var(--hacker-green);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>> SAVING_DATABASE_v1.0 <span class="cursor"></span></h1>
    
    <div class="stats">
        <div>TARGET_GOAL: Rp 1.800.000</div>
        <div>CURRENT_VAL: <span id="current-amount">Rp 0</span></div>
        <div>REMAINING : <span id="remaining-amount">Rp 1.800.000</span></div>
    </div>

    <div class="progress-container">
        <div id="progress-bar"></div>
        <div id="percent-text">0%</div>
    </div>

    <div class="input-group">
        <label for="nominal">> ENTER_DEPOSIT_AMOUNT:</label>
        <input type="number" id="nominal" placeholder="Masukkan angka..." autofocus>
        <button onclick="addFunds()">CONFIRM_TRANSACTION</button>
    </div>

    <div id="log">
        <div class="log-entry">> System initialized...</div>
        <div class="log-entry">> Ready for input...</div>
    </div>
</div>

<script>
    let currentBalance = 0;
    const target = 1800000;

    function formatRupiah(number) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
    }

    function addFunds() {
        const input = document.getElementById('nominal');
        const amount = parseInt(input.value);
        const log = document.getElementById('log');

        if (isNaN(amount) || amount <= 0) {
            alert("SISTEM ERROR: Masukkan nominal yang valid!");
            return;
        }

        currentBalance += amount;
        if (currentBalance > target) currentBalance = target;

        // Update UI
        updateUI();

        // Add Log
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerText = `> DEPOSIT_SUCCESS: +${formatRupiah(amount)} | ${new Date().toLocaleTimeString()}`;
        log.prepend(entry);

        // Reset Input
        input.value = '';
        
        if (currentBalance >= target) {
            const winEntry = document.createElement('div');
            winEntry.className = 'log-entry';
            winEntry.style.color = 'white';
            winEntry.innerText = `> TARGET_ACHIEVED: SYSTEM_COMPLETED!`;
            log.prepend(winEntry);
            alert("CONGRATULATIONS! Target tercapai!");
        }
    }

    function updateUI() {
        const percent = (currentBalance / target) * 100;
        document.getElementById('current-amount').innerText = formatRupiah(currentBalance);
        document.getElementById('remaining-amount').innerText = formatRupiah(target - currentBalance);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('percent-text').innerText = Math.floor(percent) + '%';
    }
</script>

</body>
</html>
